<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Orbis Runtime Tests</title>
  </head>
  <body>
    <div id="test-root"></div>
    <!-- Script to execute the tests and report to the DOM -->
    <pre
      id="results"
      style="
        background: #000;
        color: #0f0;
        padding: 20px;
        font-family: monospace;
      "></pre>

    <script type="module">
      import {
        OrbisComponent,
        registerComponent,
        mount,
        container,
      } from "./index.js";

      const results = document.getElementById("results");
      function log(msg) {
        results.textContent += msg + "\n";
        console.log(msg);
      }
      function pass(msg) {
        log("✅ PASS: " + msg);
      }
      function fail(msg) {
        log("❌ FAIL: " + msg);
      }

      function assert(condition, message) {
        if (!condition) throw new Error(message);
      }
      function assertEqual(actual, expected, message) {
        if (actual !== expected)
          throw new Error(`${message} (Expected: ${expected}, Got: ${actual})`);
      }
      function assertDeepEqual(actualArr, expectedArr, message) {
        if (actualArr.length !== expectedArr.length) throw new Error(message);
        for (let i = 0; i < actualArr.length; i++) {
          if (actualArr[i] !== expectedArr[i])
            throw new Error(
              `${message} (Expected: ${expectedArr}, Got: ${actualArr})`,
            );
        }
      }

      try {
        // --- Test 1: Component Registration ---
        class TestElement extends OrbisComponent {
          _compileRender(ctx, root) {
            const text = document.createTextNode("Hello Orbis");
            root.appendChild(text);
          }
        }
        registerComponent("test-element", TestElement);
        assert(
          customElements.get("test-element") !== undefined,
          "test-element should be registered",
        );
        pass("Component Registration");

        // --- Test 2: Component Mounting ---
        const target = document.createElement("div");
        const instance = mount("test-element", target);
        assertEqual(
          target.children[0],
          instance,
          "Component should be appended to target",
        );
        assertEqual(
          instance.shadowRoot.innerHTML,
          "Hello Orbis",
          "render() should have executed",
        );
        pass("Component Mounting");

        // --- Test 3: Render Lifecycle Execution Order ---
        const events = [];
        class LifecycleTest extends OrbisComponent {
          beforeRender() {
            events.push("beforeRender");
          }
          _compileRender(ctx, root) {
            events.push("compileRender");
          }
          afterRender() {
            events.push("afterRender");
          }
        }
        registerComponent("lifecycle-test", LifecycleTest);
        const lcInstance = document.createElement("lifecycle-test");
        lcInstance.render();
        assertDeepEqual(
          events,
          ["beforeRender", "compileRender", "afterRender"],
          "Lifecycle order",
        );
        pass("Lifecycle Execution Order");

        // --- Test 4: Shadow DOM Creation ---
        class ShadowTest extends OrbisComponent {}
        registerComponent("shadow-test", ShadowTest);
        const shadowInstance = document.createElement("shadow-test");
        assert(
          shadowInstance.shadowRoot !== null,
          "ShadowRoot must be created",
        );
        assertEqual(
          shadowInstance.shadowRoot.mode,
          "open",
          "ShadowRoot must be open",
        );
        pass("Shadow DOM Mode=Open");

        // --- Test 5: DOM Clearing Before Render ---
        let renderCount = 0;
        class ClearingTest extends OrbisComponent {
          _compileRender(ctx, root) {
            renderCount++;
            const p = document.createElement("p");
            p.textContent = `Render ${renderCount}`;
            root.appendChild(p);
          }
        }
        registerComponent("clearing-test", ClearingTest);
        const clearingInstance = document.createElement("clearing-test");
        clearingInstance.render(); // Render 1
        assertEqual(
          clearingInstance.shadowRoot.innerHTML,
          "<p>Render 1</p>",
          "Initial render",
        );
        clearingInstance.render(); // Render 2
        assertEqual(
          clearingInstance.shadowRoot.innerHTML,
          "<p>Render 2</p>",
          "Subtree cleared before re-render",
        );
        pass("ShadowRoot Clear Before Render");

        // --- Test 6: Event Listener Attachment Compatibility ---
        let clicked = false;
        class EventTest extends OrbisComponent {
          onClick() {
            clicked = true;
          }
          _compileRender(ctx, root) {
            const btn = document.createElement("button");
            btn.addEventListener("click", () => ctx.onClick());
            root.appendChild(btn);
          }
        }
        registerComponent("event-test", EventTest);
        const eventInstance = document.createElement("event-test");
        eventInstance.render();
        const btn = eventInstance.shadowRoot.querySelector("button");
        btn.click();
        assert(
          clicked === true,
          "Bound event listener should trigger context method",
        );
        pass("Event Bindings");

        // --- Test 7: State Initialization & setState() ---
        class StateInitTest extends OrbisComponent {}
        registerComponent("stateinit-test", StateInitTest);
        const stateInit = document.createElement("stateinit-test");
        assertDeepEqual(
          Object.keys(stateInit.state),
          [],
          "Initial state should be empty object",
        );
        stateInit.setState({ a: 1 });
        assertEqual(stateInit.state.a, 1, "setState should merge properties");
        stateInit.setState({ b: 2 });
        assertEqual(
          stateInit.state.a,
          1,
          "setState should not overwrite existing properties",
        );
        assertEqual(stateInit.state.b, 2, "setState should add new properties");
        pass("State Initialization & setState Merging");

        // --- Test 8: setState does NOT implicitly trigger render ---
        let renderTriggered = false;
        class StateRenderTest extends OrbisComponent {
          _compileRender() {
            renderTriggered = true;
          }
        }
        registerComponent("state-render-test", StateRenderTest);
        const stateRender = document.createElement("state-render-test");
        stateRender.setState({ x: 10 });
        assertEqual(
          renderTriggered,
          false,
          "setState MUST NOT trigger render implicitly",
        );
        pass("setState Without Implicit Rendering");

        // --- Test 9: rerender() executes explicitly ---
        class RerenderTest extends OrbisComponent {
          _compileRender(ctx, root) {
            const el = document.createElement("span");
            el.textContent = `Count: ${ctx.state.count || 0}`;
            root.appendChild(el);
          }
        }
        registerComponent("rerender-test", RerenderTest);
        const rerend = document.createElement("rerender-test");
        rerend.render();
        assertEqual(rerend.shadowRoot.innerHTML, "<span>Count: 0</span>");
        rerend.setState({ count: 5 });
        assertEqual(
          rerend.shadowRoot.innerHTML,
          "<span>Count: 0</span>",
          "DOM should not update until rerender() is called",
        );
        rerend.rerender();
        assertEqual(
          rerend.shadowRoot.innerHTML,
          "<span>Count: 5</span>",
          "rerender() rebuilt DOM with new state",
        );
        pass("Explicit rerender() Execution");

        // --- Test 10: Event handler calling setState + rerender ---
        class CounterTest extends OrbisComponent {
          constructor() {
            super();
            this.state = { clicks: 0 };
          }
          increment() {
            this.setState({ clicks: this.state.clicks + 1 });
            this.rerender();
          }
          _compileRender(ctx, root) {
            const btn = document.createElement("button");
            btn.textContent = `Clicks: ${ctx.state.clicks}`;
            btn.addEventListener("click", () => ctx.increment());
            root.appendChild(btn);
          }
        }
        registerComponent("counter-test", CounterTest);
        const counter = document.createElement("counter-test");
        counter.render();
        const counterBtn = counter.shadowRoot.querySelector("button");
        assertEqual(counterBtn.textContent, "Clicks: 0");
        counterBtn.click();
        assertEqual(
          counter.shadowRoot.querySelector("button").textContent,
          "Clicks: 1",
          "Event handler mutated state and re-rendered successfully",
        );
        pass("Event Handler State Mutation + rerender()");

        // --- Test 11: Multiple rerenders produce identical DOM ---
        class IdempTest extends OrbisComponent {
          constructor() {
            super();
            this.state = { text: "fixed" };
          }
          _compileRender(ctx, root) {
            const el = document.createElement("p");
            el.textContent = ctx.state.text;
            root.appendChild(el);
          }
        }
        registerComponent("idemp-test", IdempTest);
        const idemp = document.createElement("idemp-test");
        idemp.render();
        const firstHTML = idemp.shadowRoot.innerHTML;
        idemp.rerender();
        idemp.rerender();
        idemp.rerender();
        assertEqual(
          idemp.shadowRoot.innerHTML,
          firstHTML,
          "Multiple rerenders of same state yield identical DOM footprint",
        );
        pass("Multiple rerender() Determinism");

        // --- Test 12: Provider Registration ---
        class ConfigState {
          constructor() {
            this.version = "1.0";
          }
        }
        container.register(ConfigState);
        assert(
          container.providers.has(ConfigState) === true,
          "ConfigState registered in global DI container",
        );
        pass("DI Provider Registration");

        // --- Test 13: Singleton State Behavior ---
        const cfg1 = container.resolve(ConfigState);
        const cfg2 = container.resolve(ConfigState);
        assert(cfg1 !== undefined, "Resolved state must not be undefined");
        assert(
          cfg1 === cfg2,
          "resolve(Class) must return the exact same Singleton memory reference",
        );
        pass("DI Singleton State Resolution");

        // --- Test 14: Strict Dependency Validation ---
        class UnknownState {}
        let threw = false;
        try {
          container.resolve(UnknownState);
        } catch (e) {
          threw = true;
        }
        assert(
          threw === true,
          "resolve() must throw error for unregistered token synchronously",
        );
        pass("DI Missing Dependency Error");

        // --- Test 15: DI Component Creation ---
        class StatefulApp extends OrbisComponent {
          constructor(config) {
            super();
            this.state = { v: config.version };
          }
          _compileRender(ctx, root) {
            const el = document.createElement("p");
            el.innerText = `App Version: ${ctx.state.v}`;
            root.appendChild(el);
          }
        }
        registerComponent("stateful-app", StatefulApp);
        // compiled code requests creation with deps
        const appNode = container.createComponent(StatefulApp, [ConfigState]);
        appNode.render();
        assertEqual(
          appNode.shadowRoot.innerHTML,
          "<p>App Version: 1.0</p>",
          "Component accurately received injected singleton config",
        );
        pass("DI Container Component Factory");

        // --- Test 16: Child components destroyed on rerender ---
        let childDestroyedCount = 0;
        class TrackedChild extends OrbisComponent {
          destroy() {
            childDestroyedCount++;
            super.destroy();
          }
        }
        registerComponent("tracked-child", TrackedChild);

        class ParentDestroyTest extends OrbisComponent {
          _compileRender(ctx, root) {
            // Emulate loop-created codegen
            for (let i = 0; i < 3; i++) {
              const c = document.createElement("tracked-child");
              ctx.registerChild(c);
              c.render();
              root.appendChild(c);
            }
          }
        }
        registerComponent("parent-destroy", ParentDestroyTest);

        const parentNode = document.createElement("parent-destroy");
        parentNode.render();
        assertEqual(
          parentNode.__children.length,
          3,
          "Parent tracked 3 children",
        );

        parentNode.rerender();
        assertEqual(
          childDestroyedCount,
          3,
          "rerender() actively invoked destroy() on all tracked children",
        );
        assertEqual(
          parentNode.__children.length,
          3,
          "Parent tracked 3 NEW children after rerender",
        );
        pass("Teardown: Child components destroyed on rerender");

        // --- Test 17: Event listeners removed on destroy ---
        let btnClicked = 0;
        class ListenerTest extends OrbisComponent {
          _compileRender(ctx, root) {
            const btn = document.createElement("button");
            ctx.addListener(btn, "click", () => btnClicked++);
            root.appendChild(btn);
          }
        }
        registerComponent("listener-test", ListenerTest);
        const lNode = document.createElement("listener-test");
        lNode.render();
        const testBtn = lNode.shadowRoot.querySelector("button");
        testBtn.click();
        assertEqual(btnClicked, 1, "Listener active while mounted");

        // Destroy component but keep DOM reference alive to prove listener detachment
        lNode.destroy();
        testBtn.click();
        assertEqual(
          btnClicked,
          1,
          "destroy() physically removed event listener, preventing memory/closure leaks",
        );
        pass("Teardown: Event listeners unbound on destroy()");

        // --- Test 18: Nested components initialized and destroyed recursively ---
        let nestedDestroyCall = false;
        class DeepChild extends OrbisComponent {
          destroy() {
            nestedDestroyCall = true;
            super.destroy();
          }
        }
        registerComponent("deep-child", DeepChild);

        class MiddleChild extends OrbisComponent {
          _compileRender(ctx, root) {
            const d = document.createElement("deep-child");
            ctx.registerChild(d);
            d.render();
            root.appendChild(d);
          }
        }
        registerComponent("middle-child", MiddleChild);

        class RootParent extends OrbisComponent {
          _compileRender(ctx, root) {
            const m = document.createElement("middle-child");
            ctx.registerChild(m);
            m.render();
            root.appendChild(m);
          }
        }
        registerComponent("root-parent", RootParent);

        const rootTree = document.createElement("root-parent");
        rootTree.render();
        rootTree.destroy();
        assertEqual(
          nestedDestroyCall,
          true,
          "destroy() propagated deeply through component hierarchy",
        );
        pass("Teardown: Deep recursive tree footprint cleaned safely");

        // --- Test 19: No listener duplication after rerender ---
        let doubleClickDetect = 0;
        class DupeListenerTest extends OrbisComponent {
          _compileRender(ctx, root) {
            const btn = document.createElement("button");
            ctx.addListener(btn, "click", () => doubleClickDetect++);
            root.appendChild(btn);
          }
        }
        registerComponent("dupe-listener", DupeListenerTest);
        const dupeNode = document.createElement("dupe-listener");
        dupeNode.render();
        dupeNode.rerender();
        dupeNode.rerender();

        const currentBtn = dupeNode.shadowRoot.querySelector("button");
        currentBtn.click();
        assertEqual(
          doubleClickDetect,
          1,
          "rerender() cleared old closures. New button triggered exactly 1 time.",
        );
        pass("Teardown: Event listeners strictly deduplicated across cycles");

        log("\nALL TESTS PASSED SUCCESSFULLY!");

        // Mark tests as complete for the browser agent
        const doneDiv = document.createElement("div");
        doneDiv.id = "tests-completed";
        doneDiv.innerText = "success";
        document.body.appendChild(doneDiv);
      } catch (err) {
        fail(err.message);
        console.error(err);
        const doneDiv = document.createElement("div");
        doneDiv.id = "tests-completed";
        doneDiv.innerText = "failure";
        document.body.appendChild(doneDiv);
      }
    </script>
  </body>
</html>
